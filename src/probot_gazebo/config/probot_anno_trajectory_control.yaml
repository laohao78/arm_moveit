thth0110:
  arm_joint_controller:
    type: "position_controllers/JointTrajectoryController"
    joints:
      - j1
      - j2
      - j3
      - j4
      - j5
      - j6
      - j7
    # 👇👇👇 关键新增参数 👇👇👇
    allow_partial_joints_goal: true   # ← 允许轨迹只包含部分关节！

    gains:
      j1:   {p: 1000.0, i: 0.0, d: 0.1, i_clamp: 0.0}
      j2:   {p: 1000.0, i: 0.0, d: 0.1, i_clamp: 0.0}
      j3:   {p: 1000.0, i: 0.0, d: 0.1, i_clamp: 0.0}
      j4:   {p: 1000.0, i: 0.0, d: 0.1, i_clamp: 0.0}
      j5:   {p: 1000.0, i: 0.0, d: 0.1, i_clamp: 0.0}
      j6:   {p: 5000.0, d: 10.0, i: 0.1, i_clamp: 1.0}
      j7:   {p: 1000.0, i: 0.0, d: 0.1, i_clamp: 0.0}

  gripper_joint_controller:
    type: "position_controllers/JointTrajectoryController"
    joints:
      - j8
    gains:
      j8:  {p: 50.0, d: 1.0, i: 0.01, i_clamp: 1.0}